name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Start server and run tests
        run: |
          npm run dev &
          sleep 8
          npm run test

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: panorama-screenshots
          path: test-artifacts/
          retention-days: 30